<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#000"/>
  <text x="50%" y="50%" text-anchor="middle" dy=".35em" font-family="Courier New, monospace" font-size="64" fill="#00ff00" stroke="#00ff00" stroke-width="2" filter="url(#glow)">CL</text>
  <text x="50%" y="70%" text-anchor="middle" dy=".35em" font-family="Courier New, monospace" font-size="32" fill="#00ff00" opacity="0.7">TECH CORE</text>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4.5" result="coloredBlur"/>
