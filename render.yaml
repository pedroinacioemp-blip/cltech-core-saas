services:
  # Node.js API (Backend Principal)
  - type: web
    name: cltech-api
    env: node
    plan: free
    region: ohio
    buildCommand: cd api && npm install
    startCommand: cd api && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cltech-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cltech-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Static Site (Frontend React)
  - type: web
    name: cltech-frontend
    env: static
    # Plan is not allowed for static sites in Blueprints as they are always free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://cltech-api-ch41.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Node.js Bot (WhatsApp Automation)
  - type: web
    name: cltech-bot
    env: node
    plan: free
    region: ohio
    buildCommand: cd bot && npm install
    startCommand: cd bot && node src/index.js
    envVars:
      - key: API_URL
        value: https://cltech-api-ch41.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer

  # Redis Cache Service
  - type: redis
    name: cltech-redis
    plan: free
    region: ohio
    ipAllowList: [] # Allow all internal connections

databases:
  - name: cltech-db
    plan: free
    region: ohio
